spring.application.name=LearnHub

# Server Configuration
server.port=8081

# PostgreSQL (Default)
app.database.host=${DB_HOST:127.0.0.1}
app.database.port=${DB_PORT:5433}
app.database.name=${DB_NAME:elearning}
app.database.schema=${DB_SCHEMA:public}
spring.datasource.url=${DB_URL:jdbc:postgresql://${app.database.host}:${app.database.port}/${app.database.name}?currentSchema=${app.database.schema}}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:public}

# Course resource uploads
app.storage.resources-dir=${RESOURCE_STORAGE_DIR:uploads/resources}
spring.servlet.multipart.max-file-size=1GB
spring.servlet.multipart.max-request-size=1025MB

# JWT
app.jwt.secret=${JWT_SECRET:QkFTRTY0X0RFVkwzR19TRUNSRVRfS0VZXzMyX0JZVEVfTEFOR0g=}
app.jwt.expiration=86400000

# Email notifications
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:no-reply@learnhub.local}
app.frontend.reset-password-url=${FRONTEND_RESET_PASSWORD_URL:http://localhost:5173/reset-password}
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:false}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
